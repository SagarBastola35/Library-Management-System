<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>LibraCore | Library Management System</title>
    <!-- Google Fonts + Font Awesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <i class="fas fa-book-open"></i>
          <span>LibraCore</span>
        </div>
        <ul class="nav-links" id="navLinks">
          <li>
            <a href="#" class="nav-link active" data-section="home"
              ><i class="fas fa-home"></i> Home</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-section="add-book-section"
              ><i class="fas fa-plus-circle"></i> Add Book</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-section="stats"
              ><i class="fas fa-chart-line"></i> Stats</a
            >
          </li>
        </ul>
        <div class="menu-toggle" id="mobileMenuToggle">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </nav>

    <main class="main-container">
      <!-- Hero / welcome area -->
      <div class="hero-section">
        <h1>📖 Library Management System</h1>
        <p>
          Manage your book collection seamlessly • borrow, return, edit & track
        </p>
      </div>

      <!-- Search + filters row -->
      <div class="search-stats-wrapper">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by title, author or ISBN..."
            autocomplete="off"
          />
          <button id="clearSearchBtn" class="clear-search">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
        <div class="stats-pills" id="statsPills">
          <!-- dynamic stats injected via JS -->
        </div>
      </div>

      <!-- ADD BOOK CARD (modern form) -->
      <div class="add-book-card" id="add-book-section">
        <div class="card-header">
          <i class="fas fa-feather-alt"></i>
          <h2>Add New Book</h2>
        </div>
        <form id="addBookForm" class="add-book-form">
          <div class="form-row">
            <div class="input-group">
              <label><i class="fas fa-heading"></i> Title *</label>
              <input type="text" id="title" placeholder="Book title" required />
            </div>
            <div class="input-group">
              <label><i class="fas fa-user"></i> Author *</label>
              <input
                type="text"
                id="author"
                placeholder="Author name"
                required
              />
            </div>
          </div>
          <div class="form-row">
            <div class="input-group">
              <label><i class="fas fa-barcode"></i> ISBN *</label>
              <input
                type="text"
                id="isbn"
                placeholder="ISBN-10 or ISBN-13"
                required
              />
            </div>
            <div class="input-group">
              <label><i class="fas fa-calendar-alt"></i> Year *</label>
              <input
                type="number"
                id="year"
                placeholder="YYYY"
                min="1000"
                max="2030"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i> Add Book to Library
          </button>
        </form>
      </div>

      <!-- Books Grid / Cards Section -->
      <div class="books-section-header">
        <h2><i class="fas fa-layer-group"></i> Book Collection</h2>
        <span id="bookCountBadge" class="badge-count">0 books</span>
      </div>
      <div id="booksGrid" class="books-grid">
        <!-- dynamic cards injected -->
        <div class="loading-placeholder">
          <i class="fas fa-spinner fa-pulse"></i> Loading library...
        </div>
      </div>
    </main>

    
    <footer class="footer">
      <div class="footer-content">
        <div class="footer-copy">
          <i class="far fa-copyright"></i>
          <span>Sagar Bastola</span>
          <span id="currentYear"></span> LibraCore · Intelligent Library
          Management
        </div>
        <div class="footer-links">
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fas fa-envelope"></i></a>
          <a href="#"><i class="fas fa-shield-alt"></i> Privacy</a>
        </div>
      </div>
    </footer>

    <!-- EDIT MODAL (for editing book details) -->
    <div id="editModal" class="modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <h3><i class="fas fa-edit"></i> Edit Book Details</h3>
          <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <form id="editBookForm">
          <input type="hidden" id="editBookId" />
          <div class="input-group">
            <label>Title *</label>
            <input type="text" id="editTitle" required />
          </div>
          <div class="input-group">
            <label>Author *</label>
            <input type="text" id="editAuthor" required />
          </div>
          <div class="input-group">
            <label>ISBN *</label>
            <input type="text" id="editIsbn" required />
          </div>
          <div class="input-group">
            <label>Year *</label>
            <input type="number" id="editYear" required min="1000" max="2030" />
          </div>
          <div class="modal-buttons">
            <button type="button" class="btn-secondary" id="cancelModalBtn">
              Cancel
            </button>
            <button type="submit" class="btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
